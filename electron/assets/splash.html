<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMX ACARS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 20px;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #e6edf3;
      margin-bottom: 32px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(59, 130, 246, 0.15);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .status {
      margin-top: 16px;
      font-size: 11px;
      color: #8b949e;
      letter-spacing: 0.5px;
    }

    /* Update available state */
    .update-msg {
      font-size: 14px;
      color: #e6edf3;
      margin-bottom: 20px;
      text-align: center;
      line-height: 1.4;
    }

    .button-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      -webkit-app-region: no-drag;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      outline: none;
      transition: background 0.15s ease, opacity 0.15s ease;
    }

    .btn:active {
      opacity: 0.8;
    }

    .btn-primary {
      background: #3b82f6;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-ghost {
      background: transparent;
      color: #8b949e;
      border: 1px solid #30363d;
    }

    .btn-ghost:hover {
      color: #e6edf3;
      border-color: #8b949e;
    }

    /* Progress bar */
    .progress-track {
      width: 220px;
      height: 6px;
      background: #21262d;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #3b82f6;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* Error state */
    .error-msg {
      font-size: 13px;
      color: #f85149;
      margin-bottom: 18px;
      text-align: center;
      line-height: 1.4;
      max-width: 260px;
    }
  </style>
</head>
<body>
  <img class="logo" src="logos/chevron-dark.png" alt="SMX" draggable="false">
  <div class="title">SMX ACARS</div>

  <!-- State: loading (default) -->
  <div id="state-loading" class="state">
    <div class="spinner"></div>
    <div class="status">Starting up&hellip;</div>
  </div>

  <!-- State: update-available -->
  <div id="state-update" class="state" style="display:none">
    <div class="update-msg">Version <span id="update-version"></span> is available</div>
    <div class="button-row">
      <button id="btn-download" class="btn btn-primary">Download &amp; Install</button>
      <button id="btn-skip" class="btn btn-ghost">Skip</button>
    </div>
  </div>

  <!-- State: downloading -->
  <div id="state-downloading" class="state" style="display:none">
    <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
    <div class="status"><span id="dl-percent">0</span>% &mdash; Downloading update&hellip;</div>
  </div>

  <!-- State: installing -->
  <div id="state-installing" class="state" style="display:none">
    <div class="spinner"></div>
    <div class="status">Installing update&hellip;</div>
  </div>

  <!-- State: error -->
  <div id="state-error" class="state" style="display:none">
    <div class="error-msg" id="error-text">Update failed</div>
    <button id="btn-continue" class="btn btn-ghost">Continue</button>
  </div>

  <script>
    var allStates = ['state-loading', 'state-update', 'state-downloading', 'state-installing', 'state-error'];

    function hideAllStates() {
      for (var i = 0; i < allStates.length; i++) {
        document.getElementById(allStates[i]).style.display = 'none';
      }
    }

    function showState(id) {
      hideAllStates();
      document.getElementById(id).style.display = '';
    }

    function showUpdate(version) {
      document.getElementById('update-version').textContent = version;
      showState('state-update');
    }

    function showDownloading() {
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('dl-percent').textContent = '0';
      showState('state-downloading');
    }

    function setProgress(percent) {
      var clamped = Math.max(0, Math.min(100, Math.round(percent)));
      document.getElementById('progress-fill').style.width = clamped + '%';
      document.getElementById('dl-percent').textContent = clamped;
    }

    function showInstalling() {
      showState('state-installing');
    }

    function showError(msg) {
      document.getElementById('error-text').textContent = msg || 'Update failed';
      showState('state-error');
    }
  </script>
</body>
</html>
