<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMX ACARS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      width: 340px;
      height: 400px;
      background: linear-gradient(to top right, #000000, #1B1B1C);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
      margin-bottom: 32px;
    }

    /* ── Loading bar (default state) ──────────────── */
    .progress-track {
      width: 100px;
      height: 3px;
      background: #1f1f1f;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 100%;
      background: #ffffff;
      border-radius: 2px;
      transform-origin: left;
      animation: loading-slide 1.2s ease-in-out infinite;
    }

    @keyframes loading-slide {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(0%); }
      100% { transform: translateX(100%); }
    }

    .version {
      position: absolute;
      bottom: 24px;
      font-size: 11px;
      color: #4a4a4a;
      letter-spacing: 0.5px;
    }

    /* ── Update available state ────────────────────── */
    .state { display: flex; flex-direction: column; align-items: center; }
    .state.hidden { display: none; }

    .update-msg {
      font-size: 13px;
      color: #e6e6e6;
      margin-bottom: 16px;
      text-align: center;
    }

    .button-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      -webkit-app-region: no-drag;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 18px;
      border-radius: 6px;
      border: none;
      outline: none;
      transition: background 0.15s ease, opacity 0.15s ease;
    }

    .btn:active { opacity: 0.8; }

    .btn-primary {
      background: #ffffff;
      color: #0a0a0a;
    }
    .btn-primary:hover { background: #e0e0e0; }

    .btn-ghost {
      background: transparent;
      color: #666;
      border: 1px solid #2a2a2a;
    }
    .btn-ghost:hover {
      color: #e6e6e6;
      border-color: #555;
    }

    /* ── Downloading state ─────────────────────────── */
    .dl-progress-track {
      width: 180px;
      height: 3px;
      background: #1f1f1f;
      border-radius: 2px;
      overflow: hidden;
    }

    .dl-progress-fill {
      height: 100%;
      width: 0%;
      background: #ffffff;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .status {
      margin-top: 12px;
      font-size: 11px;
      color: #4a4a4a;
      letter-spacing: 0.3px;
    }

    /* ── Installing spinner ────────────────────────── */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #1f1f1f;
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Error state ──────────────────────────────── */
    .error-msg {
      font-size: 12px;
      color: #f87171;
      margin-bottom: 14px;
      text-align: center;
      line-height: 1.4;
      max-width: 240px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logos/chevron-light.png" alt="SMX" draggable="false">

    <!-- State: loading (default) -->
    <div id="state-loading" class="state">
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>

    <!-- State: update-available -->
    <div id="state-update" class="state hidden">
      <div class="update-msg">Version <span id="update-version"></span> available</div>
      <div class="button-row">
        <button id="btn-download" class="btn btn-primary">Download</button>
        <button id="btn-skip" class="btn btn-ghost">Skip</button>
      </div>
    </div>

    <!-- State: downloading -->
    <div id="state-downloading" class="state hidden">
      <div class="dl-progress-track"><div id="progress-fill" class="dl-progress-fill"></div></div>
      <div class="status"><span id="dl-percent">0</span>% &mdash; Downloading</div>
    </div>

    <!-- State: installing -->
    <div id="state-installing" class="state hidden">
      <div class="spinner"></div>
      <div class="status">Installing update</div>
    </div>

    <!-- State: error -->
    <div id="state-error" class="state hidden">
      <div class="error-msg" id="error-text">Update failed</div>
      <button id="btn-continue" class="btn btn-ghost">Continue</button>
    </div>

    <div class="version" id="version-label"></div>
  </div>

  <script>
    var allStates = ['state-loading', 'state-update', 'state-downloading', 'state-installing', 'state-error'];

    function hideAllStates() {
      for (var i = 0; i < allStates.length; i++) {
        document.getElementById(allStates[i]).style.display = 'none';
      }
    }

    function showState(id) {
      hideAllStates();
      document.getElementById(id).style.display = '';
    }

    function setVersion(ver) {
      document.getElementById('version-label').textContent = 'v' + ver;
    }

    function showUpdate(version) {
      document.getElementById('update-version').textContent = version;
      showState('state-update');
    }

    function showDownloading() {
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('dl-percent').textContent = '0';
      showState('state-downloading');
    }

    function setProgress(percent) {
      var clamped = Math.max(0, Math.min(100, Math.round(percent)));
      document.getElementById('progress-fill').style.width = clamped + '%';
      document.getElementById('dl-percent').textContent = clamped;
    }

    function showInstalling() {
      showState('state-installing');
    }

    function showError(msg) {
      document.getElementById('error-text').textContent = msg || 'Update failed';
      showState('state-error');
    }
  </script>
</body>
</html>
