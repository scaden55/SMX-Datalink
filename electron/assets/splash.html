<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMX ACARS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 20px;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #e6edf3;
      margin-bottom: 32px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(59, 130, 246, 0.15);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      margin-top: 16px;
      font-size: 11px;
      color: #8b949e;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <img class="logo" src="logos/chevron-dark.png" alt="SMX" draggable="false">
  <div class="title">SMX ACARS</div>
  <div class="spinner"></div>
  <div class="status">Starting up&hellip;</div>
</body>
</html>
